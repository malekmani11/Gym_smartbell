spring.application.name=api-gateway
server.port=9000

# ── Eureka ──────────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ── Routes ──────────────────────────────────────────────────────────────────
# auth (public — doit être EN PREMIER, avant toute autre route)
spring.cloud.gateway.routes[0].id=auth-route
spring.cloud.gateway.routes[0].uri=lb://member-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0

# member-service  (port 8081)
spring.cloud.gateway.routes[1].id=member-service
spring.cloud.gateway.routes[1].uri=lb://member-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/members/**,/api/subscriptions/**,/api/loyalty/**,/api/qr/**,/api/statistics/**,/api/crm/**,/api/users/**,/api/checkins/**

# coach-service  (port 8082)
spring.cloud.gateway.routes[2].id=coach-service
spring.cloud.gateway.routes[2].uri=lb://coach-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/coaches/**,/api/courses/**,/api/exercises/**,/api/training/**,/api/ai-program/**

# payment-service  (port 8083)
spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://payment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/payments/**,/api/plans/**

# nutrition-service  (port 8084)
spring.cloud.gateway.routes[4].id=nutrition-service
spring.cloud.gateway.routes[4].uri=lb://nutrition-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/nutrition-plans/**,/api/meals/**,/api/groq/**

# complaint-service  (port 8085)
spring.cloud.gateway.routes[5].id=complaint-service
spring.cloud.gateway.routes[5].uri=lb://complaint-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/complaints/**

# event-service  (port 8086)
spring.cloud.gateway.routes[6].id=event-service
spring.cloud.gateway.routes[6].uri=lb://event-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/events/**

# notification-service  (port 8087)
spring.cloud.gateway.routes[7].id=notification-service
spring.cloud.gateway.routes[7].uri=lb://notification-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/notifications/**,/api/messages/**,/api/devices/**

# machine-service  (port 8088)
spring.cloud.gateway.routes[8].id=machine-service
spring.cloud.gateway.routes[8].uri=lb://machine-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/machines/**,/api/salles/**

# ── JWT (même clé que member-service — HS256) ────────────────────────────────
# Cette clé doit correspondre à application.security.jwt.secret-key dans member-service
application.security.jwt.secret-key=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# ── Load Balancer ────────────────────────────────────────────────────────────
spring.cloud.loadbalancer.ribbon.enabled=false

# ── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Logging ─────────────────────────────────────────────────────────────────
logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.security=WARN
logging.level.reactor.netty=WARN
