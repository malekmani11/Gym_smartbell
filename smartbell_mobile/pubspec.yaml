name: smartbell_mobile
description: "SmartBell Gym Management - Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:

  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP & API
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2

  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  lottie: ^3.1.0
  smooth_page_indicator: ^1.1.0

  # Utils
  intl: ^0.19.0
  jwt_decoder: ^2.0.1
  vibration: ^1.8.4

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # QR / Machine scanner
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0
  share_plus: ^10.0.0
  url_launcher: ^6.3.0

  # Offline / Hive cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
