<div class="export-group" [attr.aria-label]="'Exporter ' + label()">

  <!-- ── PDF button ──────────────────────────────────────────────────────── -->
  <button
    class="export-btn export-btn--pdf"
    [disabled]="isPdfLoading()"
    (click)="exportPdf()"
    title="Exporter en PDF">

    @if (isPdfLoading()) {
      <!-- Spinner -->
      <svg class="spin" width="13" height="13" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4" stroke-dashoffset="10" stroke-linecap="round"/>
      </svg>
    } @else {
      <!-- PDF document icon -->
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="9" y1="13" x2="15" y2="13"/>
        <line x1="9" y1="17" x2="13" y2="17"/>
      </svg>
    }
    <span>PDF</span>
  </button>

  <!-- ── Excel button ────────────────────────────────────────────────────── -->
  <button
    class="export-btn export-btn--excel"
    [disabled]="isExcelLoading()"
    (click)="exportExcel()"
    title="Exporter en Excel">

    @if (isExcelLoading()) {
      <svg class="spin" width="13" height="13" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4" stroke-dashoffset="10" stroke-linecap="round"/>
      </svg>
    } @else {
      <!-- Table / spreadsheet icon -->
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="3"  y1="9"  x2="21" y2="9"/>
        <line x1="3"  y1="15" x2="21" y2="15"/>
        <line x1="9"  y1="3"  x2="9"  y2="21"/>
        <line x1="15" y1="3"  x2="15" y2="21"/>
      </svg>
    }
    <span>Excel</span>
  </button>

</div>
