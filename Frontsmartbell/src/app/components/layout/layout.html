<!-- --sw is the CSS variable for sidebar width, driven by the collapsed signal.
     It keeps the topbar and content in sync when sidebar collapses. -->
<div class="app-shell" [style.--sw]="sidebarCollapsed() ? '4rem' : '16rem'">

  <app-sidebar
    [collapsed]="sidebarCollapsed()"
    (toggleCollapse)="sidebarCollapsed.set(!sidebarCollapsed())">
  </app-sidebar>

  <app-topbar></app-topbar>

  <!-- Only this element scrolls -->
  <main class="page-content">
    <!-- Ambient background orbs (subtle) -->
    <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-gold-main/4 blur-[100px] rounded-full translate-x-1/3 -translate-y-1/3 pointer-events-none animate-glow-breathe"></div>
    <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-gold-main/3 blur-[100px] rounded-full -translate-x-1/3 translate-y-1/3 pointer-events-none animate-glow-breathe" style="animation-delay:2s"></div>

    <div class="relative z-10 max-w-7xl mx-auto min-h-full">
      <router-outlet></router-outlet>
    </div>
  </main>

</div>

<!-- Toast: outside layout flow, always above everything -->
<app-toast></app-toast>
