
<div class="space-y-6 animate-fade-in relative z-10">

  <!-- Header -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h1 class="text-3xl font-playfair font-bold text-white mb-2 tracking-wide">Planning & Cours</h1>
      <p class="text-gray-400 font-inter">Consultez le calendrier de la semaine et gérez les réservations.</p>
    </div>
    <div class="flex gap-3">
      <button (click)="printSchedule()" class="btn-gold-outline text-sm py-2 px-4 shadow-gold flex items-center gap-2">
        <i class="fas fa-print"></i>
        <span class="hidden sm:inline">Imprimer</span>
      </button>
      <button (click)="calComp.openNewCourse()"
              class="btn-gold text-sm py-2 px-4 shadow-gold flex items-center gap-2">
        <i class="fas fa-calendar-plus text-black-bg"></i>
        <span class="hidden sm:inline">Nouveau cours</span>
      </button>
    </div>
  </div>

  <!-- Type filters -->
  <div class="flex flex-wrap gap-2">
    <button (click)="typeFilter.set('all')"
            [class]="typeFilter() === 'all'
              ? 'px-4 py-2 rounded-full bg-gold-main text-black-bg font-bold shadow-gold text-sm'
              : 'px-4 py-2 rounded-full bg-black-bg border border-white/10 text-gray-400 hover:border-white/30 transition-all text-sm'">
      Tous
    </button>
    <button (click)="typeFilter.set('yoga')"
            [class]="typeFilter() === 'yoga'
              ? 'px-4 py-2 rounded-full bg-purple-600 text-white font-bold text-sm'
              : 'px-4 py-2 rounded-full bg-black-bg border border-white/10 text-gray-400 hover:border-white/30 transition-all text-sm'">
      <i class="fas fa-om mr-1 text-xs"></i> Yoga
    </button>
    <button (click)="typeFilter.set('crossfit')"
            [class]="typeFilter() === 'crossfit'
              ? 'px-4 py-2 rounded-full bg-orange-600 text-white font-bold text-sm'
              : 'px-4 py-2 rounded-full bg-black-bg border border-white/10 text-gray-400 hover:border-white/30 transition-all text-sm'">
      <i class="fas fa-fire mr-1 text-xs"></i> CrossFit
    </button>
    <button (click)="typeFilter.set('powerlifting')"
            [class]="typeFilter() === 'powerlifting'
              ? 'px-4 py-2 rounded-full bg-red-600 text-white font-bold text-sm'
              : 'px-4 py-2 rounded-full bg-black-bg border border-white/10 text-gray-400 hover:border-white/30 transition-all text-sm'">
      <i class="fas fa-dumbbell mr-1 text-xs"></i> Powerlifting
    </button>
    <button (click)="typeFilter.set('cardio')"
            [class]="typeFilter() === 'cardio'
              ? 'px-4 py-2 rounded-full bg-blue-600 text-white font-bold text-sm'
              : 'px-4 py-2 rounded-full bg-black-bg border border-white/10 text-gray-400 hover:border-white/30 transition-all text-sm'">
      <i class="fas fa-heartbeat mr-1 text-xs"></i> Cardio
    </button>
  </div>

  <!-- FullCalendar -->
  <div class="mt-12">
    <app-course-calendar #calComp [typeFilter]="typeFilter()"></app-course-calendar>
  </div>

</div>
